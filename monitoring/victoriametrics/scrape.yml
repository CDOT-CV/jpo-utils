global:
  scrape_interval: 30s

scrape_configs:
  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "node-exporter:9100"
  - job_name: "kafka-exporter"
    static_configs:
      - targets:
          - "kafka-exporter:8000"
  - job_name: "mongodb-exporter"
    static_configs:
      - targets:
          - "mongodb-exporter:9216"
    metrics_path: /metrics
  - job_name: "ode-exporter"
    static_configs:
      - targets:
          - "192.168.170.53:8080"
    metrics_path: /actuator/prometheus
